name: Feature Pipeline

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: read


    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read package.json version
        run: |
          APP_VERSION=$(jq -r .version package.json)
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Check Version
        run: echo "$APP_VERSION"

      - name: Check Node Version
        run: |
          node -v
          npm -v

      - name: Install Dependencies
        run:  npm ci --ignore-scripts

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # - name: Sonar Scan
      #   uses: SonarSource/sonarqube-scan-action@v6
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: https://sonarcloud.io

      # - name: Sonar Quality Gate check
      #   id: sonar_check
      #   uses: sonarsource/sonarqube-quality-gate-action@master
      #   with:
      #     pollingTimeoutSec: 600
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: https://sonarcloud.io

      # - name: Check Dependabot Alerts
      #   id: library_scan
      #   uses: Posture-Cybersecurity/dependabot-security-checker@v1.1.5
      #   with:
      #     github-token: ${{ secrets.DEPENDABOT_TOKEN }}
      #     severities: 'critical,high'
      #     output-file: 'security-report.csv'
      #     fail-on-alerts: 'true'
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Verify AWS Login
        run: aws sts get-caller-identity


      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t catalogue:${{ env.APP_VERSION }} .

          
      
      - name: Slack Alert
        if: always()
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "✅ NodeJS Feature Pipeline Success"

              

